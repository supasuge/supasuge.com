{% extends "admin/base_admin.html" %}
{% block title %}Categories{% endblock %}

{% block content %}
<h1>Categories</h1>

<div class="form-container">
  <form method="post" action="{{ url_for('admin.category_create') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label>New Category</label>
      <input type="text" name="name" placeholder="Category name" required>
    </div>
    <button type="submit" class="btn btn-primary">Create</button>
  </form>
</div>

<table class="data-table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Slug</th>
      <th>Posts</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for c in categories %}
    <tr>
      <td>
        <form method="post" action="{{ url_for('admin.category_edit', category_id=c.id) }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <input type="text" name="name" value="{{ c.name }}" required>
      </td>
      <td><code>{{ c.slug }}</code></td>
      <td>{{ c.posts|length }}</td>
      <td>
          <button class="btn btn-secondary btn-small">Save</button>
        </form>

        {% if c.slug != 'general' %}
        <form method="post"
              action="{{ url_for('admin.category_delete', category_id=c.id) }}"
              style="display:inline;"
              onsubmit="return confirm('Delete this category? Posts will be moved to General.')">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button class="btn btn-danger btn-small">Delete</button>
        </form>
        {% endif %}
      </td>
    </tr>
    {% else %}
    <tr>
      <td colspan="4" class="muted">No categories found.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
