# =============================================================================
# nginx/conf.d/site.conf
# Hardcoded for supasuge.com (+ www)
# =============================================================================

# Needed for websocket/upgrade support in proxy blocks
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# ---------------------------------------------------------------------------
# HTTP :80
# - ACME challenge stays on HTTP
# - Everything else redirects to HTTPS
# ---------------------------------------------------------------------------
server {
  listen 80;
  listen [::]:80;

  server_name supasuge.com www.supasuge.com;
  server_tokens off;

  # ACME challenge (certbot HTTP-01)
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect all other traffic to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ---------------------------------------------------------------------------
# HTTPS :443
# ---------------------------------------------------------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name supasuge.com www.supasuge.com;
  server_tokens off;

  ssl_certificate     /etc/letsencrypt/live/supasuge.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/supasuge.com/privkey.pem;

  # HSTS (enable only once HTTPS is real and stable)
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # -------------------------------------------------------------------------
  # Static/public served directly
  # -------------------------------------------------------------------------
  location /static/ {
    alias /var/www/static/;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location = /robots.txt {
    alias /var/www/public/robots.txt;
    access_log off;
  }

  location = /security.txt {
    alias /var/www/public/security.txt;
    access_log off;
  }

  location = /sitemap.xml {
    alias /var/www/public/sitemap.xml;
    access_log off;
  }

  # -------------------------------------------------------------------------
  # Health endpoints (no rate limiting, useful for orchestration/debug)
  # -------------------------------------------------------------------------
  location = /health {
    proxy_pass http://app;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location = /ready {
    proxy_pass http://app;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # -------------------------------------------------------------------------
  # API (higher limit)
  # -------------------------------------------------------------------------
  location /api/ {
    limit_req zone=api burst=100 nodelay;

    proxy_pass http://app;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # -------------------------------------------------------------------------
  # Main app
  # -------------------------------------------------------------------------
  location / {
    limit_req zone=general burst=40 nodelay;

    proxy_pass http://app;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
