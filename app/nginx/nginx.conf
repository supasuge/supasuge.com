# =============================================================================
# nginx/nginx.conf (global)
# - Docker upstream "app" => web:8000
# - All server blocks live in conf.d/site.conf
# =============================================================================

user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;
    keepalive_requests 1000;

    types_hash_max_size 2048;

    # Match Flask MAX_CONTENT_LENGTH (2MB)
    client_max_body_size 2m;

    # --- Compression ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # --- Rate limiting zones (nginx-side defense-in-depth) ---------------------
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # --- Upstream -------------------------------------------------------------
    upstream app {
        server web:8000;
        keepalive 32;
    }

    # --- TLS defaults (TLS1.2 ciphers only; TLS1.3 is implicit in nginx) -------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;

    # IMPORTANT: ssl_ciphers is for TLS1.2 and below. Do NOT include TLS1.3 cipher names here.
    # Compatible with OpenSSL 3.x - removed CHACHA20-POLY1305 ciphers that cause errors in OpenSSL 3.x
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    ssl_prefer_server_ciphers off;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    # DH params (mounted into container)
    ssl_dhparam /etc/nginx/dhparam.pem;

    # Resolver (needed for OCSP stapling and DNS in containers)
    resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
    resolver_timeout 5s;

    # Global security headers (CSP stays in Flask)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    include /etc/nginx/conf.d/*.conf;
}
