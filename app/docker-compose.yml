services:
  redis:
    image: redis:7.2.5-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SITE_NAME: ${SITE_NAME:-Evan Pardon's Portfolio}
      SITE_URL: https://${DOMAIN}

      SECRET_KEY: ${SECRET_KEY}
      ANALYTICS_SALT: ${ANALYTICS_SALT}

      DATABASE_URL: sqlite:////app/instance/blog.db

      ALLOWED_HOSTS: ${DOMAIN},www.${DOMAIN},localhost,127.0.0.1

      BEHIND_PROXY: "1"
      PROXY_FIX_X_FOR: "1"
      PROXY_FIX_X_PROTO: "1"
      PROXY_FIX_X_HOST: "1"

      COOKIE_SECURE: "1"
      COOKIE_SAMESITE: "Lax"
      ENABLE_HSTS: "1"

      RATELIMIT_STORAGE_URL: redis://redis:6379/0
      RATELIMIT_DEFAULT: "300/hour"

      RUN_MIGRATIONS: "0"

      GUNICORN_WORKERS: "2"
      GUNICORN_THREADS: "4"
      LOG_LEVEL: "info"

    volumes:
      - ./public:/app/public:rw
      - sqlitedata:/app/instance:rw

      - ./static:/app/static:rw
      - ./templates:/app/templates:ro
      - ./keys:/app/keys:ro
      - ./alembic.ini:/app/alembic.ini:ro
      - ./migrations:/app/migrations:rw

    networks:
      - appnet

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777,size=64M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  sqlitedata:
    name: supasuge_sqlite_data
  caddy-data:
    name: supasuge_caddy_data
  caddy-config:
    name: supasuge_caddy_config
